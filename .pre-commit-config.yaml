repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.21
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: docs-openapi-sync
        name: docs OpenAPI artifact sync
        entry: npm --prefix docs-site run check:openapi-sync
        language: system
        files: ^(docs/openapi\.json|docs-site/public/openapi\.json|docs-site/scripts/(sync-docs|check-openapi-sync)\.mjs)$
        pass_filenames: false

      - id: frontend-prettier
        name: frontend prettier
        entry: npm --prefix frontend run format
        language: system
        files: ^frontend/(src/.*\.(js|ts|svelte)|scripts/.*\.mjs)$
        pass_filenames: false
